<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dashboard — Vital Lab</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@800&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/feather-icons"></script>
  
  <link rel="stylesheet" href="styles.css">

  <style>
    * { font-family: 'Inter', sans-serif !important; box-sizing: border-box; }
    body { background-color: #f8fafc; margin: 0; color: #1e293b; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      padding: 24px;
      background: white;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stat-label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.025em;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      color: #1e293b;
      font-family: 'Montserrat', sans-serif !important;
    }

    .activity-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-bottom: 1px solid #f1f5f9;
    }

    .activity-row:last-child { border-bottom: none; }

    .status-pill {
      background: #dcfce7;
      color: #166534;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
    }
  </style>
</head>
<body data-page="dashboard">

  <header class="site-header">
    <a href="dashboard.html" class="brand-container">
      <div class="brand-logo-box">V</div>
      <span class="brand-text">VITAL<span style="color: #2563eb;">LAB</span></span>
    </a>

    <nav class="nav-menu">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="booking.html" class="nav-link">Book Test</a>
      <a href="reports.html" class="nav-link">Reports</a>
      <a href="profile.html" class="nav-link">
        <i data-feather="user" style="width: 18px; height: 18px;"></i>
        <span>Profile</span>
      </a>
      <button id="globalLogoutBtn" class="logout-btn">Logout</button>
    </nav>
  </header>

  <main class="page" style="max-width: 1000px; margin: 0 auto; padding: 40px 20px;">
    <div style="margin-bottom: 30px;">
      <h1 style="font-family: 'Montserrat', sans-serif !important; font-size: 1.85rem; margin: 0;">
        Welcome back, <span id="dashUserName" style="color: #2563eb;">User</span>!
      </h1>
      <p class="muted">Here is what's happening with your health profile today.</p>
    </div>

    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label">Total Bookings</div>
        <div class="stat-value" id="statTotalBookings">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Reports Ready</div>
        <div class="stat-value" id="statReportsReady" style="color: #16a34a;">0</div>
      </div>
    </div>

    <section class="card" style="padding: 24px; border-radius: 16px; background: white; border: 1px solid #e2e8f0;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3 style="margin: 0; font-family: 'Montserrat', sans-serif !important;">Recent Activity</h3>
        <a href="reports.html" style="color: #2563eb; font-size: 0.85rem; font-weight: 600; text-decoration: none;">View All</a>
      </div>
      
      <div id="recentBookingsList">
        <div style="text-align: center; padding: 40px 0;">
          <i data-feather="calendar" style="width: 40px; height: 40px; color: #cbd5e1; margin-bottom: 10px;"></i>
          <p class="muted">No recent bookings found.</p>
        </div>
      </div>
    </section>
  </main>

  <script src="common.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (window.feather) feather.replace();

      // 1. Load User Data
      const user = JSON.parse(localStorage.getItem("loggedInUser"));
      if (user) {
        document.getElementById("dashUserName").textContent = user.name.split(' ')[0];
      } else {
        window.location.href = "login.html";
      }

      // 2. Load Bookings Data
      const bookings = JSON.parse(localStorage.getItem("bookings")) || [];
      
      // Update Stats
      document.getElementById("statTotalBookings").textContent = bookings.length;
      document.getElementById("statReportsReady").textContent = bookings.length;

      // 3. Render Recent Bookings
      const listContainer = document.getElementById("recentBookingsList");
      if (bookings.length > 0) {
        listContainer.innerHTML = bookings.slice(-5).reverse().map(booking => `
          <div class="activity-row">
            <div style="display: flex; align-items: center; gap: 15px;">
              <div style="background: #f1f5f9; padding: 10px; border-radius: 8px;">
                <i data-feather="activity" style="width: 18px; color: #2563eb;"></i>
              </div>
              <div>
                <div style="font-weight: 600; font-size: 0.95rem;">${booking.testName}</div>
                <div class="muted" style="font-size: 0.8rem;">${booking.date} • ${booking.time}</div>
              </div>
            </div>
            <span class="status-pill">Paid</span>
          </div>
        `).join('');
        feather.replace();
      }
    });
  </script>
</body>
</html>
