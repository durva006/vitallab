<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Profile — Vital Lab</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="profile">

<header class="site-header">
  <div class="brand">🩺 <strong>Vital Lab</strong></div>
  <nav class="main-nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="booking.html">Book Test</a>
    <a href="reports.html">My Reports</a>
    <a href="#" id="logoutLink" style="display:none">Logout 🚪</a>
  </nav>
</header>

<main class="page">
  <section class="card wide-card">
    <h1>My Profile 👤</h1>

    <p><strong>Name:</strong> <span id="pName"></span></p>
    <p><strong>Email:</strong> <span id="pEmail"></span></p>
    <p><strong>Phone:</strong> <span id="pPhone"></span></p>
    <p><strong>Gender:</strong> <span id="pGender"></span></p>
    <p><strong>Address:</strong> <span id="pAddress"></span></p>

    <div style="text-align:right; margin-top:20px;">
      <button id="editProfileBtn" class="btn primary">Edit Profile ✏️</button>
    </div>
  </section>
</main>

<script src="common.js"></script>

<script>
const user = JSON.parse(localStorage.getItem("loggedInUser"));
if (!user) { 
  alert("Please login first");
  window.location.href = "login.html";
}

document.getElementById("pName").textContent = user.name || "";
document.getElementById("pEmail").textContent = user.email || "";
document.getElementById("pPhone").textContent = user.phone || "";
document.getElementById("pGender").textContent = user.gender || "";
document.getElementById("pAddress").textContent = user.address || "";
</script>

</body>
</html>
