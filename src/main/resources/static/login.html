<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login — Vital Lab</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="login">

<header class="site-header">
  <div class="brand">🩺 <strong>Vital Lab</strong></div>
  <nav class="main-nav">
    <a href="signup.html">Sign Up</a>
    <a href="login.html" class="active">Login</a>
  </nav>
</header>

<main class="page">
  <section class="card narrow-card">
    <h1>Sign in 🔓</h1>
    <p class="muted">Use your account to access the dashboard and reports.</p>

    <form id="loginForm" class="stack-form" autocomplete="off" onsubmit="return false;">
  <label>Email
    <input type="email" id="loginEmail" required>
  </label>
  <label>Password
    <input type="password" id="loginPassword" required>
  </label>

  <div style="text-align:right">
    <button type="button" id="loginBtn" class="btn primary">Sign in</button>
  </div>
</form>

<script src="common.js"></script>

console.log("✅ Login page HTML is running");
</script>
</body>
</html>
