<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login — Vital Lab</title>
  <link rel="stylesheet" href="styles.css">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@800&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/feather-icons"></script>

  <style>
    /* Global font override */
    * {
      font-family: 'Inter', sans-serif !important;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background-color: #f8fafc;
      color: #1e293b;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Centers the login card on the page */
    .login-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .narrow-card {
      max-width: 400px;
      width: 100%;
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
      border: 1px solid #e2e8f0;
    }

    .stack-form label {
      display: block;
      margin-bottom: 20px;
      font-weight: 600;
      font-size: 0.9rem;
      color: #475569;
    }

    .stack-form input {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    .stack-form input:focus {
      outline: none;
      border-color: #2563eb;
    }
  </style>
</head>
<body data-page="login">

  <header class="site-header">
  <a href="index.html" class="brand-container">
    <div class="brand-logo-box">V</div>
    <span class="brand-text">VITAL<span style="color: #2563eb;">LAB</span></span>
  </a>

  <nav class="nav-menu">
    <a href="index.html" class="nav-link">Home</a>
    <a href="signup.html" class="nav-link">Sign Up</a>
    </nav>
</header>

  <main class="login-container">
    <section class="narrow-card">
      <div style="text-align: center; margin-bottom: 30px;">
        <div style="background: #eff6ff; width: 60px; height: 60px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 15px;">
          <i data-feather="lock" style="color: #2563eb;"></i>
        </div>
        <h1 style="font-size: 1.75rem; font-weight: 800; margin: 0; font-family: 'Montserrat', sans-serif !important;">Sign In</h1>
        <p class="muted" style="margin-top: 8px;">Access your medical records securely.</p>
      </div>
      
      <form id="loginForm" class="stack-form">
        <label>Email Address
          <input type="email" id="loginEmail" placeholder="name@example.com" required>
        </label>
        <label>Password
          <input type="password" id="loginPassword" placeholder="••••••••" required>
        </label>
        <button type="submit" id="loginBtn" class="btn primary" style="width: 100%; margin-top: 10px; padding: 14px; font-weight: 700;">
          Sign In
        </button>
      </form>

      <div style="text-align: center; margin-top: 25px; font-size: 0.9rem;">
        <span class="muted">Don't have an account?</span> 
        <a href="signup.html" style="color: #2563eb; font-weight: 600; text-decoration: none;">Create one</a>
      </div>
    </section>
  </main>

  <script src="common.js"></script>
</body>
</html>
