<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sign Up — Vital Lab</title>

  <link rel="stylesheet" href="styles.css">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@800&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/feather-icons"></script>

  <style>
    * { font-family: 'Inter', sans-serif !important; box-sizing: border-box; }
    body { background-color: #f8fafc; margin: 0; color: #1e293b; }

    .grid-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .grid-form label {
      display: flex;
      flex-direction: column;
      font-size: 0.85rem;
      font-weight: 600;
      color: #475569;
    }

    .grid-form input, .grid-form select, .grid-form textarea {
      margin-top: 6px;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 1rem;
    }

    @media (max-width: 600px) {
      .grid-form { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body data-page="signup">

  <header class="site-header">
    <a href="index.html" class="brand-container">
      <div class="brand-logo-box">V</div>
      <span class="brand-text">VITAL<span style="color: #2563eb;">LAB</span></span>
    </a>

    <nav class="nav-menu">
      <a href="index.html" class="nav-link">Home</a>
      <a href="login.html" class="nav-link">Log In</a>
    </nav>
  </header>

  <main class="page">
    <section class="card wide-card" style="max-width: 800px; margin: 40px auto; padding: 40px; background: white; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);">

      <div style="text-align: center; margin-bottom: 30px;">
        <div style="background: #eff6ff; width: 50px; height: 50px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 15px;">
          <i data-feather="user-plus" style="color: #2563eb;"></i>
        </div>
        <h1 style="font-family: 'Montserrat', sans-serif !important; margin: 0;">Create Your Account</h1>
        <p class="muted" style="margin-top: 8px;">Join Vital Lab to track your health journey.</p>
      </div>

      <form id="signupForm" class="grid-form">

        <label>First Name
          <input type="text" id="signupName" placeholder="e.g. Mira" required>
        </label>

        <label>Last Name
          <input type="text" id="signupName" placeholder="e.g. Mehta" required>
        </label>

        <label>Email <Address></Address>
          <input type="email" id="signupEmail" placeholder="xyz@example.com" required>
        </label>

        <label>Phone Number
          <input type="tel" id="signupPhone" placeholder="+91 XXXXX XXXXX">
        </label>

        <label>Gender
          <select id="signupGender">
            <option value="">Select Gender</option>
            <option>Female</option>
            <option>Male</option>
            <option>Other</option>
          </select>
        </label>

        <label>Date of Birth
          <input type="date" id="dob" required>
        </label>

        <label style="grid-column: 1 / -1;">Home Address
          <textarea id="signupAddress" rows="2" placeholder="Street, City, Pincode"></textarea>
        </label>

        <label>Set Password
          <input type="password" id="signupPassword" placeholder="Minimum 8 characters" required>
        </label>

        <label>Confirm Password
          <input type="password" id="confirmPassword" placeholder="Repeat password" required>
        </label>

        <div style="grid-column: 1 / -1; margin-top: 15px;">
          <button type="submit" class="btn primary" style="width: 100%; font-size: 1.1rem; padding: 14px; border-radius: 8px; cursor: pointer;">
            Create Account
          </button>
          <p class="muted" style="text-align: center; margin-top: 20px;">
            Already have an account? 
            <a href="login.html" style="color: #2563eb; font-weight: 600; text-decoration: none;">Log In</a>
          </p>
        </div>

      </form>
    </section>
  </main>

  <script>
    const API_BASE = "https://vitallab.onrender.com/api";
  document.addEventListener("DOMContentLoaded", function() {

    // ✅ FIX: icons not showing
    if (window.feather) feather.replace();

    const form = document.getElementById("signupForm");

    form.addEventListener("submit", async function(e) {
      e.preventDefault();

      const password = document.getElementById("signupPassword").value.trim();
      const confirm = document.getElementById("confirmPassword").value.trim();

      if (password !== confirm) {
        alert("⚠️ Passwords do not match!");
        return;
      }

      const dobInput = document.getElementById("dob").value;

      if (!dobInput) {
        alert("⚠️ Please select your Date of Birth");
        return;
      }

      // ✅ AGE CALCULATION
      function calculateAge(dob) {
        const birthDate = new Date(dob);
        const today = new Date();

        let age = today.getFullYear() - birthDate.getFullYear();
        const m = today.getMonth() - birthDate.getMonth();

        if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
          age--;
        }

        return age;
      }

      const age = calculateAge(dobInput);

      if (age < 0 || isNaN(age)) {
        alert("⚠️ Invalid Date of Birth");
        return;
      }
    
      // ✅ EMAIL VALIDATION
const email = document.getElementById("signupEmail").value.trim();
const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

if (!emailRegex.test(email)) {
  alert("⚠️ Enter a valid email address");
  return;
}

// ✅ PHONE VALIDATION (Indian)
const phone = document.getElementById("signupPhone").value.trim();
const phoneRegex = /^[6-9]\d{9}$/;

if (!phoneRegex.test(phone)) {
  alert("⚠️ Enter valid 10-digit Indian phone number");
  return;
}

      const user = {
        name: document.getElementById("signupName").value.trim(),
        email: document.getElementById("signupEmail").value.trim(),
        password: password,
        phone: document.getElementById("signupPhone").value.trim(),
        gender: document.getElementById("signupGender").value,
        address: document.getElementById("signupAddress").value.trim(),
        dob: dobInput,
        age: age
      };

      try {
        const response = await fetch(`${API_BASE}/users/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(user)
        });

        if (!response.ok) {
          const err = await response.text();
          throw new Error(err);
        }

        alert("🎉 Account created successfully!");
        form.reset();
        window.location.href = "login.html";

      } catch (error) {
        console.error(error);
        alert("⚠️ " + error.message);
      }

    });

  });
  </script>

</body>
</html>
