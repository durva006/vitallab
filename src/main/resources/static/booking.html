<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Test — Vital Lab</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@800&display=swap" rel="stylesheet">
  
  <script src="https://unpkg.com/feather-icons"></script>

  <style>
    /* Force Inter font on all elements including textareas */
    * {
      font-family: 'Inter', -apple-system, sans-serif !important;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background-color: #f8fafc;
      color: #1e293b;
    }

    /* Expandable Card CSS */
    .card.expandable {
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      overflow: hidden;
    }

    .card.expandable.active {
      border: 2px solid #2563eb;
      box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.1);
    }

    /* The Hidden Form Section */
    .booking-drawer {
      max-height: 0;
      opacity: 0;
      transition: max-height 0.4s ease, opacity 0.3s ease;
    }

    .card.expandable.active .booking-drawer {
      max-height: 1200px;
      opacity: 1;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e2e8f0;
    }

    .grid-form-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 600px) {
      .grid-form-inner { grid-template-columns: 1fr; }
    }

    label { font-size: 0.85rem; font-weight: 600; color: #475569; }
    
    input, select, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 1rem;
    }

    textarea { resize: vertical; }

    .btn.primary {
      background: #2563eb;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body data-page="booking">

  <header class="site-header">
    <a href="dashboard.html" class="brand-container">
      <div class="brand-logo-box">V</div>
      <span class="brand-text">VITAL<span style="color: #2563eb;">LAB</span></span>
    </a>

    <nav class="nav-menu">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="booking.html" class="nav-link">Book Test</a>
      <a href="reports.html" class="nav-link">Reports</a>
      <a href="profile.html" class="nav-link">
        <i data-feather="user" style="width: 18px; height: 18px;"></i>
        <span>Profile</span>
      </a>
      <button id="globalLogoutBtn" class="logout-btn">Logout</button>
    </nav>
  </header>

  <main class="page" style="max-width: 800px; margin: 0 auto; padding: 20px;">
    <div style="margin-bottom: 30px;">
      <h1 style="font-size: 2rem; font-weight: 800; margin-bottom: 10px;">Book a Health Test</h1>
      <p style="color: #64748b;">Select a package below to schedule your home collection.</p>
    </div>

    <div id="packageGrid"></div>
  </main>

  <script src="common.js"></script>

  <script>
    const packages = [
      { id: "p1", name: "Basic Health Check", price: 499, desc: "CBC, Blood Sugar, and BMI analysis.", icon: "activity", category: "CBC" },
      { id: "p2", name: "Full Body Checkup", price: 1999, desc: "CBC, LFT, KFT, Lipid, Thyroid, Vit D & B12.", icon: "layers", category: "CBC" },
      { id: "p3", name: "Cardiac Care", price: 1299, desc: "ECG, Lipid Profile, BP, Cholesterol, CRP test.", icon: "heart", category: "Lipid Profile" },
      { id: "p4", name: "Diabetes Management", price: 999, desc: "HbA1c, Fasting Sugar, Insulin Level, Kidney Function.", icon: "droplet", category: "Diabetes" },
      { id: "p5", name: "Thyroid Profile", price: 699, desc: "T3, T4, TSH levels to check thyroid function.", icon: "target", category: "Thyroid" },
      { id: "p6", name: "Women’s Wellness", price: 1499, desc: "Hormone Panel, Thyroid, Vitamin D, Iron Studies.", icon: "user", category: "Thyroid" },
      { id: "p7", name: "Senior Citizen Male", price: 2499, desc: "PSA (Prostate), Bone Health, Cardiac Risk, Vitamin Panel.", icon: "shield", category: "Lipid Profile" },
      { id: "p8", name: "Immunity Screen", price: 899, desc: "Vitamin C, Zinc, Vitamin D3, and Immunoglobulin.", icon: "umbrella", category: "CBC" },
      { id: "p9", name: "Liver Function (LFT)", price: 799, desc: "Bilirubin, SGOT, SGPT, and Protein levels.", icon: "crosshair", category: "CBC" }
    ];

    const testAgeRules = {
    "Basic Health Check": { min: 5, max: 100 },
    "Full Body Checkup": { min: 18, max: 100 },
    "Cardiac Care": { min: 30, max: 100 },
    "Diabetes Management": { min: 25, max: 100 },
    "Thyroid Profile": { min: 10, max: 100 },
    "Women’s Wellness": { min: 18, max: 60 },
    "Senior Citizen Male": { min: 60, max: 100 },
    "Immunity Screen": { min: 5, max: 100 },
    "Liver Function (LFT)": { min: 10, max: 100 }
   };

    function renderPackages() {
      const grid = document.getElementById('packageGrid');
      
      packages.forEach(pkg => {
        const card = document.createElement('div');
        card.className = 'card expandable';
        card.innerHTML = `
          <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; align-items: center; gap: 15px;">
              <div style="background: #eff6ff; width: 48px; height: 48px; border-radius: 10px; display: flex; align-items: center; justify-content: center;">
                <i data-feather="${pkg.icon}" style="color: #2563eb;"></i>
              </div>
              <div>
                <h3 style="margin:0; font-size: 1.1rem; font-weight: 700;">${pkg.name}</h3>
                <p style="margin:0; font-size: 0.85rem; color: #64748b;">${pkg.desc}</p>
              </div>
            </div>
            <div style="text-align: right;">
              <div style="font-weight: 800; color: #2563eb; font-size: 1.2rem;">₹${pkg.price}</div>
            </div>
          </div>

          <div class="booking-drawer">
            <form onsubmit="handleBooking(event, '${pkg.name}', ${pkg.price}, '${pkg.category}')">
              <div class="grid-form-inner">
                <label>Full Name <input type="text" placeholder="Patient Name" required></label>
                <label>Phone Number <input type="tel" placeholder="+91" required></label>
                <label>Preferred Date <input type="date" class="bookingDate" required></label>
                <label>Preferred Time 
                  <select required>
                    <option value="">Choose Slot</option>
                    <option>Morning (7AM - 11AM)</option>
                    <option>Afternoon (12PM - 4PM)</option>
                  </select>
                </label>
                <label style="grid-column: 1 / -1;">Full Collection Address
                  <textarea rows="3" placeholder="House No, Street, Landmark, Pincode" required></textarea>
                </label>
              </div>
              <div style="text-align: right; margin-top: 20px;">
                <button type="submit" class="btn primary">Confirm & Pay</button>
              </div>
            </form>
          </div>
        `;

        card.addEventListener('click', function(e) {
          if (e.target.closest('form')) return;
          const wasActive = this.classList.contains('active');
          document.querySelectorAll('.card.expandable').forEach(c => c.classList.remove('active'));
          if (!wasActive) this.classList.add('active');
        });

        grid.appendChild(card);
      });
      if (window.feather) feather.replace();
      const today = new Date().toISOString().split("T")[0];

document.querySelectorAll(".bookingDate").forEach(input => {
  input.min = today;
});
    }

    function handleBooking(event, testName, price, category) {
      event.preventDefault();
      const inputs = event.target.querySelectorAll('input, select, textarea');
      const bookingData = {
        testName, testCategory: category, price,
        patientName: inputs[0].value, phone: inputs[1].value,
        date: inputs[2].value, time: inputs[3].value, address: inputs[4].value
      };
      sessionStorage.setItem("pendingBooking", JSON.stringify(bookingData));
      window.location.href = "payment.html";
    }

    window.onload = renderPackages;
  </script>
</body>
</html>
