<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Payment — Health Booking</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="payment">

<header class="site-header">
  <div class="brand">🩺 <strong>Vital Lab</strong></div>
  <nav class="main-nav">
    <a href="dashboard.html">Dashboard</a>
    <a href="booking.html">Book Test</a>
    <a href="reports.html">My Reports</a>
    <a href="profile.html">Profile</a>
    <a href="#" id="logoutLink" style="display:none">Logout 🚪</a>
  </nav>
</header>

<main class="page">
  <section class="card narrow-card">
    <h1>Payment 💳</h1>
    <div id="pendingInfo" class="muted" style="margin-bottom:12px"></div>

    <form id="paymentForm" class="stack-form">
      <label>Cardholder name
        <input type="text" id="cardName" required>
      </label>

      <label>Card number
        <input type="text" id="cardNumber" placeholder="4242 4242 4242 4242" required>
      </label>

      <div class="two-col">
        <label>Expiry
          <input type="text" id="cardExp" placeholder="MM/YY" required>
        </label>
        <label>CVC
          <input type="text" id="cardCvc" placeholder="123" required>
        </label>
      </div>

      <div style="text-align:right">
        <button type="submit" class="btn primary">Pay and Confirm</button>
      </div>
    </form>
  </section>
</main>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const user = JSON.parse(localStorage.getItem("loggedInUser"));
  if (!user) { alert("Please login"); window.location.href = "login.html"; return; }

  const pending = JSON.parse(sessionStorage.getItem("pendingBooking"));
  if (!pending) { alert("No booking in progress"); window.location.href = "booking.html"; return; }

  document.getElementById("pendingInfo").textContent =
    `Pay to confirm: ${pending.testName} on ${pending.date} at ${pending.time} — ₹${pending.price}`;

  document.getElementById("paymentForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    const bookingRequest = {
      testName: pending.testName,
      date: pending.date,
      status: "confirmed",
      price: pending.price,
      user: { id: user.id },
      test: null
    };

    try {
      const res = await fetch("http://localhost:8080/api/bookings/create", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(bookingRequest)
      });

      if (!res.ok) {
        const txt = await res.text();
        console.error("Booking failed:", txt);
        alert("Payment failed: " + txt);
        return;
      }
      const data = await res.json();
      sessionStorage.setItem("lastReceiptId", data.receiptId);
      sessionStorage.setItem("lastBooking", JSON.stringify(pending));
      sessionStorage.removeItem("pendingBooking");

      alert("Payment successful!");
      window.location.href = "receipt.html";
    } catch (err) {
      console.error(err);
      alert("Server error during payment");
    }
  });
});
</script>

<script src="common.js"></script>


</body>
</html>
