<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Payment — Vital Lab</title>
  <link rel="stylesheet" href="styles.css">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@800&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/feather-icons"></script>

  <style>
    * {
      font-family: 'Inter', sans-serif !important;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background-color: #f8fafc;
      color: #1e293b;
    }

    .narrow-card {
      max-width: 500px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      border: 1px solid #e2e8f0;
    }

    .summary-box {
      background: #f1f5f9;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 25px;
      border-left: 4px solid #2563eb;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .stack-form label {
      display: block;
      margin-bottom: 15px;
      font-size: 0.85rem;
      font-weight: 600;
      color: #475569;
    }

    .stack-form input {
      width: 100%;
      padding: 12px;
      margin-top: 6px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 1rem;
    }

    .secure-badge {
      display: flex;
      justify-content: center;
      gap: 8px;
      font-size: 0.8rem;
      color: #10b981;
      margin-top: 20px;
    }
  </style>
</head>

<body data-page="payment">

  <header class="site-header">
    <a href="dashboard.html" class="brand-container">
      <div class="brand-logo-box">V</div>
      <span class="brand-text">VITAL<span style="color: #2563eb;">LAB</span></span>
    </a>

    <nav class="nav-menu">
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="booking.html" class="nav-link">Book Test</a>
      <a href="reports.html" class="nav-link">Reports</a>
      <button id="globalLogoutBtn" class="logout-btn">Logout</button>
    </nav>
  </header>

  <main class="page">
    <section class="narrow-card">

      <h1 style="font-family: 'Montserrat'; display:flex; gap:10px;">
        <i data-feather="credit-card"></i> Checkout
      </h1>

      <!-- SUMMARY -->
      <div id="pendingInfo" class="summary-box">
        <div id="summaryDetails">Loading...</div>
      </div>

      <form id="paymentForm" class="stack-form">

        <!-- PAYMENT METHOD -->
        <label>Select Payment Method</label>
        <div style="display:flex; gap:15px; margin-bottom:20px;">
          <label><input type="radio" name="paymentMethod" value="card" checked> 💳 Card</label>
          <label><input type="radio" name="paymentMethod" value="upi"> 📱 UPI</label>
          <label><input type="radio" name="paymentMethod" value="cash"> 💵 Pay at Visit</label>
        </div>

        <!-- CARD -->
        <div id="cardFields">
          <label>Cardholder Name
            <input type="text" id="cardName">
          </label>

          <label>Card Number
            <input type="text" id="cardNumber">
          </label>

          <div class="two-col">
            <label>Expiry
              <input type="text" id="cardExp">
            </label>
            <label>CVC
              <input type="text" id="cardCvc">
            </label>
          </div>
        </div>

        <!-- UPI -->
        <div id="upiFields" style="display:none;">
          <label>UPI ID
            <input type="text" id="upiId" placeholder="name@upi">
          </label>
        </div>

        <!-- CASH -->
        <div id="cashInfo" style="display:none; font-size:0.9rem; color:#64748b;">
          Pay directly at the lab during your visit.
        </div>

        <button type="submit" class="btn primary" style="width:100%; margin-top:20px;">
          Pay & Confirm Booking
        </button>
      </form>

      <div class="secure-badge">
        <i data-feather="lock"></i> Secure Payment
      </div>

    </section>
  </main>

  <script src="common.js"></script>

  <script>

    // ✅ CARD VALIDATION (Luhn Algorithm)
    function isValidCard(number) {
      number = number.replace(/\s/g, "");

      if (!/^\d{16}$/.test(number)) return false;

      let sum = 0;
      let shouldDouble = false;

      for (let i = number.length - 1; i >= 0; i--) {
        let digit = parseInt(number[i]);

        if (shouldDouble) {
          digit *= 2;
          if (digit > 9) digit -= 9;
        }

        sum += digit;
        shouldDouble = !shouldDouble;
      }

      return sum % 10 === 0;
    }

    document.addEventListener("DOMContentLoaded", function () {

      if (window.feather) feather.replace();

      const user = JSON.parse(localStorage.getItem("loggedInUser"));
      const pending = JSON.parse(sessionStorage.getItem("pendingBooking"));

      if (!user || !pending) {
        alert("Session expired");
        window.location.href = "booking.html";
        return;
      }

      // SHOW SUMMARY
      document.getElementById("summaryDetails").innerHTML = `
  <b>${pending.testName}</b><br>
  ${pending.date} at ${pending.time}<br>
  <span style="color:#2563eb; font-weight:800;">₹${pending.price}</span>
`;

      // SWITCH UI
      document.querySelectorAll('input[name="paymentMethod"]').forEach(radio => {
        radio.addEventListener("change", function () {
          const val = this.value;

          document.getElementById("cardFields").style.display = val === "card" ? "block" : "none";
          document.getElementById("upiFields").style.display = val === "upi" ? "block" : "none";
          document.getElementById("cashInfo").style.display = val === "cash" ? "block" : "none";
        });
      });

      // SUBMIT
      document.getElementById("paymentForm").addEventListener("submit", async function (e) {
        e.preventDefault(); // ✅ FIRST LINE

        const method = document.querySelector('input[name="paymentMethod"]:checked').value;

        const cardNumber = document.getElementById("cardNumber").value.trim();
        const exp = document.getElementById("cardExp").value.trim();
        const cvc = document.getElementById("cardCvc").value.trim();

        // CARD VALIDATION (only if card selected)
        if (method === "card") {
          if (!isValidCard(cardNumber)) {
            alert("⚠️ Invalid card number");
            return;
          }

          const [month, year] = exp.split("/");
          if (!month || !year) {
            alert("⚠️ Enter valid expiry date");
            return;
          }

          const expiryDate = new Date(`20${year}`, month);
          if (expiryDate < new Date()) {
            alert("⚠️ Card expired");
            return;
          }

          if (!/^\d{3}$/.test(cvc)) {
            alert("⚠️ Invalid CVC");
            return;
          }
        }

        if (method === "upi" && !document.getElementById("upiId").value.trim()) {
          alert("Enter UPI ID");
          return;
        }

        const btn = e.target.querySelector("button");
        btn.disabled = true;
        btn.textContent = "Processing...";

        const receiptId = "REC-" + Math.floor(Math.random() * 1000000);

        try {
          const res = await fetch("https://vitallab.onrender.com/api/bookings/create", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              testName: pending.testName,
              date: pending.date,
              status: "confirmed",
              price: pending.price,
              paymentMethod: method,
              user: { id: user.id }
            })
          });

          if (!res.ok) throw new Error(await res.text());

          let allBookings = JSON.parse(localStorage.getItem("bookings")) || [];

          allBookings.push({
            ...pending,
            status: "Ready",
            receiptId: receiptId
          });

          localStorage.setItem("bookings", JSON.stringify(allBookings));

          sessionStorage.setItem("lastBooking", JSON.stringify(pending));
          sessionStorage.setItem("lastReceiptId", receiptId);

          alert("Payment Successful!");
          window.location.href = "receipt.html";

        } catch (err) {
          alert("Error: " + err.message);
          btn.disabled = false;
          btn.textContent = "Pay & Confirm Booking";
        }
      });
    });
  </script>

</body>

</html>
