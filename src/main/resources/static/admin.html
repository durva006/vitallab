<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vital Lab | Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@800&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Inter', sans-serif; box-sizing: border-box; }
        body { background-color: #f8fafc; margin: 0; color: #1e293b; }

        .site-header {
            background: white;
            padding: 12px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
        }

        .brand-container { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .brand-logo-box {
            background: #2563eb; color: white;
            width: 34px; height: 34px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 9px;
            font-weight: 800;
            font-family: 'Montserrat', sans-serif !important;
        }

        .brand-text {
            font-family: 'Montserrat', sans-serif !important;
            font-weight: 800; font-size: 1.3rem;
            color: #1e293b; letter-spacing: -0.04em;
        }

        .nav-links a { text-decoration: none; color: #64748b; font-weight: 600; margin-left: 20px; font-size: 0.9rem; }
        .nav-links a:hover { color: #2563eb; }

        .page-container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .admin-title { font-family: 'Montserrat', sans-serif !important; font-size: 1.85rem; margin: 0 0 10px 0; color: #1e293b; }

        .card { background: white; border-radius: 16px; border: 1px solid #e2e8f0; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background-color: #2563eb; color: white; padding: 14px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.05em; }
        th:first-child { border-radius: 8px 0 0 0; }
        th:last-child { border-radius: 0 8px 0 0; }
        td { padding: 16px 14px; border-bottom: 1px solid #f1f5f9; font-size: 0.95rem; }

        .btn-refresh { background: #2563eb; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="brand-container">
            <div class="brand-logo-box">V</div>
            <span class="brand-text">VITAL<span style="color: #2563eb;">LAB</span></span>
        </div>
        <nav class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="admin-login.html">Logout</a>
        </nav>
    </header>

    <main class="page-container">
        <h1 class="admin-title">Patient Management</h1>
        <p style="color: #64748b; margin-bottom: 30px;">Manage registered users and laboratory test records.</p>
        <div class="card">
            <div class="table-header">
                <h3 style="margin: 0; font-family: 'Montserrat', sans-serif !important;">Registered Patients</h3>
                <button class="btn-refresh" onclick="loadAllUsers()">Refresh Data</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Patient Name</th>
                        <th>Email</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <tr><td colspan="5" style="text-align: center; padding: 40px; color: #64748b;">Loading data...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="common.js"></script>
    <script>window.onload = loadAllUsers;</script>
</body>
</html>
